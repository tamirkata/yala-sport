<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Yala Sport Logo - V2D: Full red background, white dumbbell — boldest -->
  
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  
  <!-- Solid red rounded square frame -->
  <rect x="112" y="112" width="800" height="800" rx="180" ry="180" 
        fill="#FF3B5C"/>
  
  <!-- Left weight (white) -->
  <rect x="240" y="380" width="100" height="264" rx="20" ry="20" fill="#FFFFFF"/>
  
  <!-- Left inner weight (white, thinner) -->
  <rect x="340" y="430" width="60" height="164" rx="14" ry="14" fill="#FFFFFF"/>
  
  <!-- Bar (white) -->
  <rect x="400" y="490" width="224" height="44" rx="8" ry="8" fill="#FFFFFF"/>
  
  <!-- Right inner weight (white, thinner) -->
  <rect x="624" y="430" width="60" height="164" rx="14" ry="14" fill="#FFFFFF"/>
  
  <!-- Right weight (white) -->
  <rect x="684" y="380" width="100" height="264" rx="20" ry="20" fill="#FFFFFF"/>
</svg>
