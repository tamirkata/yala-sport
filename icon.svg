<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>

  <!-- Dark cosmic background -->
  <radialGradient id="bg" cx="50%" cy="42%" r="65%">
    <stop offset="0%" stop-color="#1E1030"/>
    <stop offset="100%" stop-color="#07070F"/>
  </radialGradient>

  <!-- Main fire gradient: gold → orange → red -->
  <linearGradient id="fire" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%"   stop-color="#FFC040"/>
    <stop offset="28%"  stop-color="#FF6B20"/>
    <stop offset="65%"  stop-color="#FF1F55"/>
    <stop offset="100%" stop-color="#CC0040"/>
  </linearGradient>

  <!-- Lightning bolt gradient: deep orange → bright white-gold -->
  <linearGradient id="bolt" x1="100%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%"   stop-color="#FF4010" stop-opacity="0.7"/>
    <stop offset="55%"  stop-color="#FFD030"/>
    <stop offset="100%" stop-color="#FFFFA0"/>
  </linearGradient>

  <!-- Body aura radial -->
  <radialGradient id="aura" cx="50%" cy="52%" r="48%">
    <stop offset="0%"   stop-color="#FF5520" stop-opacity="0.38"/>
    <stop offset="55%"  stop-color="#FF2050" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#FF2050" stop-opacity="0"/>
  </radialGradient>

  <!-- Ring gradient -->
  <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#FF6B35"/>
    <stop offset="50%"  stop-color="#FF1F5A"/>
    <stop offset="100%" stop-color="#FF6B35"/>
  </linearGradient>

  <!-- Large glow (fist / lightning) -->
  <filter id="glow-l" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Medium glow -->
  <filter id="glow-m" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Soft glow (body / highlights) -->
  <filter id="glow-s" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Circle clip -->
  <clipPath id="clip">
    <circle cx="256" cy="256" r="252"/>
  </clipPath>

</defs>

<g clip-path="url(#clip)">

<!-- ─── BACKGROUND ─── -->
<circle cx="256" cy="256" r="256" fill="url(#bg)"/>

<!-- Outer decorative rings -->
<circle cx="256" cy="256" r="249" fill="none" stroke="url(#ring-grad)" stroke-width="3"   opacity="0.55"/>
<circle cx="256" cy="256" r="242" fill="none" stroke="#FF6B35"           stroke-width="1.2" opacity="0.22"/>

<!-- Energy field aura behind figure -->
<ellipse cx="256" cy="292" rx="195" ry="235" fill="url(#aura)"/>

<!-- Background energy rays — 8 wide blurred rays from center -->
<g filter="url(#glow-l)" opacity="0.10">
  <polygon points="256,256 232,2   280,2"   fill="#FF6B35"/>
  <polygon points="256,256 2,232   2,280"   fill="#FF6B35"/>
  <polygon points="256,256 232,510 280,510" fill="#FF6B35"/>
  <polygon points="256,256 510,232 510,280" fill="#FF6B35"/>
  <polygon points="256,256 452,44  510,102" fill="#FF6B35"/>
  <polygon points="256,256 60,44   2,102"   fill="#FF6B35"/>
  <polygon points="256,256 452,468 510,410" fill="#FF6B35"/>
  <polygon points="256,256 60,468  2,410"   fill="#FF6B35"/>
</g>

<!-- ─── FIGURE ─── -->
<!--
  Greek god "Zeus" power pose:
  Arms raised at ~50° above horizontal, fists high and wide
  Wide power stance legs

  Key coordinates:
    Head center:       (256, 118)  r=28
    Left shoulder:     (200, 182)
    Right shoulder:    (312, 182)
    Left fist center:  (106, 72)
    Right fist center: (406, 72)
    Feet bottom:       y=484
-->

<!-- LEGS — power stance angled outward -->
<!-- Left leg -->
<path d="
  M 218,308 C 212,308 205,310 202,314
  L 180,466
  L 226,466
  C 228,432 234,388 240,348 C 244,322 245,312 243,308 Z
" fill="url(#fire)"/>
<!-- Left foot -->
<path d="M 180,462 Q 175,476 172,486 L 228,486 Q 229,474 227,463 Z" fill="#A51040"/>
<!-- Left shin highlight -->
<path d="M 208,330 Q 202,368 197,406" stroke="#FFC040" stroke-width="2.5" fill="none" opacity="0.38" stroke-linecap="round"/>

<!-- Right leg -->
<path d="
  M 294,308 C 300,308 307,310 310,314
  L 332,466
  L 286,466
  C 284,432 278,388 272,348 C 268,322 267,312 269,308 Z
" fill="url(#fire)"/>
<!-- Right foot -->
<path d="M 332,462 Q 337,476 340,486 L 284,486 Q 283,474 285,463 Z" fill="#A51040"/>
<!-- Right shin highlight -->
<path d="M 304,330 Q 310,368 315,406" stroke="#FFC040" stroke-width="2.5" fill="none" opacity="0.38" stroke-linecap="round"/>

<!-- TORSO / CHEST / ABS / HIPS -->
<path d="
  M 248,148
  L 264,148
  C 286,149 315,160 328,175
  C 338,186 336,202 332,222
  L 327,244
  C 323,258 314,268 306,276
  L 298,296 L 298,308
  L 214,308 L 214,296
  L 206,276
  C 198,268 189,258 185,244
  L 180,222
  C 176,202 174,186 184,175
  C 197,160 226,149 248,148 Z
" fill="url(#fire)" filter="url(#glow-s)"/>

<!-- Pec divide shadow -->
<line x1="256" y1="174" x2="256" y2="250" stroke="#8B0C28" stroke-width="2.2" opacity="0.5"/>

<!-- Left pec arc highlight -->
<path d="M 196,188 C 218,178 242,176 254,180"
  stroke="#FFC050" stroke-width="2.8" fill="none" opacity="0.55" stroke-linecap="round"/>
<!-- Right pec arc highlight -->
<path d="M 316,188 C 294,178 270,176 258,180"
  stroke="#FFC050" stroke-width="2.8" fill="none" opacity="0.55" stroke-linecap="round"/>

<!-- Abs -->
<ellipse cx="243" cy="270" rx="14" ry="8.5" fill="#8B1020" opacity="0.55"/>
<ellipse cx="269" cy="270" rx="14" ry="8.5" fill="#8B1020" opacity="0.55"/>
<ellipse cx="242" cy="291" rx="13" ry="7.5" fill="#8B1020" opacity="0.45"/>
<ellipse cx="270" cy="291" rx="13" ry="7.5" fill="#8B1020" opacity="0.45"/>

<!-- Neck -->
<path d="M 247,140 L 265,140 C 270,148 269,158 265,164 L 247,164 C 243,158 242,148 247,140 Z" fill="url(#fire)"/>

<!-- ARMS -->

<!-- LEFT UPPER ARM: shoulder (200,182) → elbow (152,128)
     vector(-48,-54) len=72.3  perp*(13)=(9.7,-8.6) -->
<path d="M 190,191 L 210,173 L 162,119 L 142,137 Z" fill="url(#fire)"/>

<!-- LEFT FOREARM: elbow (152,128) → fist (106,72)
     vector(-46,-56) len=72.5  perp*(10)=(7.7,-6.3) -->
<path d="M 160,135 L 145,121 L 99,66 L 113,80 Z" fill="url(#fire)"/>

<!-- Left fist -->
<path d="
  M 94,60 Q 84,57 79,65 Q 73,76 76,87 Q 80,97 92,98
  L 118,88 Q 123,78 119,67 Q 114,59 104,60 Z
" fill="url(#fire)" filter="url(#glow-s)"/>

<!-- LEFT BICEP HIGHLIGHT -->
<path d="M 175,196 Q 168,212 170,228" stroke="#FFC040" stroke-width="2.2" fill="none" opacity="0.42" stroke-linecap="round"/>
<!-- LEFT DELTOID -->
<path d="M 200,180 Q 194,190 196,202" stroke="#FFC040" stroke-width="2" fill="none" opacity="0.38" stroke-linecap="round"/>

<!-- RIGHT UPPER ARM: shoulder (312,182) → elbow (360,128)
     mirror of left -->
<path d="M 322,191 L 302,173 L 350,119 L 370,137 Z" fill="url(#fire)"/>

<!-- RIGHT FOREARM: elbow (360,128) → fist (406,72) -->
<path d="M 352,135 L 367,121 L 413,66 L 399,80 Z" fill="url(#fire)"/>

<!-- Right fist -->
<path d="
  M 418,60 Q 428,57 433,65 Q 439,76 436,87 Q 432,97 420,98
  L 394,88 Q 389,78 393,67 Q 398,59 408,60 Z
" fill="url(#fire)" filter="url(#glow-s)"/>

<!-- RIGHT BICEP HIGHLIGHT -->
<path d="M 337,196 Q 344,212 342,228" stroke="#FFC040" stroke-width="2.2" fill="none" opacity="0.42" stroke-linecap="round"/>
<!-- RIGHT DELTOID -->
<path d="M 312,180 Q 318,190 316,202" stroke="#FFC040" stroke-width="2" fill="none" opacity="0.38" stroke-linecap="round"/>

<!-- HEAD -->
<circle cx="256" cy="118" r="30" fill="url(#fire)" filter="url(#glow-s)"/>

<!-- Head halo ring -->
<circle cx="256" cy="118" r="40" fill="none" stroke="#FF8030" stroke-width="2.5" opacity="0.45" filter="url(#glow-m)"/>

<!-- Crown / hair spikes (Greek god) -->
<g fill="#FFC040" opacity="0.80" filter="url(#glow-s)">
  <polygon points="254,91  258,72  262,91"/>
  <polygon points="240,96  232,79  248,94"/>
  <polygon points="268,96  280,79  264,94"/>
  <polygon points="228,108 212,94  236,108"/>
  <polygon points="284,108 300,94  276,108"/>
</g>

<!-- Subtle jawline/brow highlight -->
<path d="M 244,111 Q 256,105 268,111" stroke="#FFD080" stroke-width="2" fill="none" opacity="0.40" stroke-linecap="round"/>

<!-- ─── CHEST LIGHTNING BOLT EMBLEM ─── -->
<path d="M 264,190 L 247,228 L 259,228 L 247,264 L 271,222 L 259,222 L 273,190 Z"
  fill="#FFE070" opacity="0.95" filter="url(#glow-m)"/>

<!-- ─── LIGHTNING BOLTS FROM FISTS ─── -->

<!-- LEFT FIST LIGHTNING — main bolt to upper-left corner -->
<path d="M 100,75  L 78,43  L 91,38  L 62,8   L 78,4   L 46,-18"
  stroke="url(#bolt)" stroke-width="5" fill="none"
  stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-m)"/>
<!-- Branch 1 -->
<path d="M 62,8 L 42,0 L 28,8"
  stroke="#FFD030" stroke-width="3" fill="none" opacity="0.8"
  stroke-linecap="round" filter="url(#glow-s)"/>
<!-- Branch 2 -->
<path d="M 78,43 L 54,36 L 36,42"
  stroke="#FFA020" stroke-width="2.5" fill="none" opacity="0.7"
  stroke-linecap="round" filter="url(#glow-s)"/>

<!-- LEFT secondary bolt (slightly different angle) -->
<path d="M 96,80  L 72,46  L 84,42  L 56,10  L 68,7   L 36,−20"
  stroke="#FF6B20" stroke-width="3" fill="none" opacity="0.5"
  stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-s)"/>

<!-- RIGHT FIST LIGHTNING — main bolt to upper-right corner -->
<path d="M 412,75 L 434,43 L 421,38 L 450,8  L 434,4  L 466,-18"
  stroke="url(#bolt)" stroke-width="5" fill="none"
  stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-m)"/>
<!-- Branch 1 -->
<path d="M 450,8 L 470,0 L 484,8"
  stroke="#FFD030" stroke-width="3" fill="none" opacity="0.8"
  stroke-linecap="round" filter="url(#glow-s)"/>
<!-- Branch 2 -->
<path d="M 434,43 L 458,36 L 476,42"
  stroke="#FFA020" stroke-width="2.5" fill="none" opacity="0.7"
  stroke-linecap="round" filter="url(#glow-s)"/>

<!-- RIGHT secondary bolt -->
<path d="M 416,80 L 440,46 L 428,42 L 456,10 L 444,7  L 476,-20"
  stroke="#FF6B20" stroke-width="3" fill="none" opacity="0.5"
  stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-s)"/>

<!-- Small ground sparks from feet -->
<path d="M 200,468 L 188,492 L 194,492 L 182,512"
  stroke="#FF6B20" stroke-width="2" fill="none" opacity="0.45"
  stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 314,468 L 326,492 L 320,492 L 332,512"
  stroke="#FF6B20" stroke-width="2" fill="none" opacity="0.45"
  stroke-linecap="round" stroke-linejoin="round"/>

<!-- ─── FIST ENERGY NODES ─── -->
<!-- Left fist -->
<circle cx="106" cy="76" r="32" fill="#FF4010" opacity="0.20" filter="url(#glow-l)"/>
<circle cx="106" cy="76" r="18" fill="#FF8020" opacity="0.55" filter="url(#glow-m)"/>
<circle cx="106" cy="76" r="9"  fill="#FFD060" opacity="0.92" filter="url(#glow-s)"/>
<circle cx="106" cy="76" r="4"  fill="#FFFFFF"  opacity="1"/>

<!-- Right fist -->
<circle cx="406" cy="76" r="32" fill="#FF4010" opacity="0.20" filter="url(#glow-l)"/>
<circle cx="406" cy="76" r="18" fill="#FF8020" opacity="0.55" filter="url(#glow-m)"/>
<circle cx="406" cy="76" r="9"  fill="#FFD060" opacity="0.92" filter="url(#glow-s)"/>
<circle cx="406" cy="76" r="4"  fill="#FFFFFF"  opacity="1"/>

</g><!-- end clip -->
</svg>
